name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyqt6 pyqtgraph numpy pandas lasio openpyxl xlrd

    - name: Find Python script
      id: find
      shell: pwsh
      run: |
        $script = Get-ChildItem -Filter "*.py" | Where-Object { $_.Name -like "*速度计算.py" -or $_.Name -like "02-*.py" } | Select-Object -First 1
        if (-not $script) {
          Write-Error "未找到可打包的 Python 脚本"
          exit 1
        }
        Write-Host "Found script: $($script.Name)"
        echo "script_name=$($script.Name)" >> $env:GITHUB_OUTPUT

    - name: Build EXE with PyInstaller
      run: pyinstaller --onefile --noconsole --name WellCorrelator --hidden-import PyQt6.sip --hidden-import pyqtgraph.graphicsItems.ViewBox.axisCtrlTemplate_pyqt6 --collect-all pyqtgraph --collect-all lasio "${{ steps.find.outputs.script_name }}"
      shell: cmd

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WellCorrelator_Windows_x64
        path: dist/WellCorrelator.exe
        retention-days: 30
