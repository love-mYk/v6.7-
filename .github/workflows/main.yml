name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10"]   # 使用稳定版本

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pyqt6 pyqtgraph numpy pandas lasio openpyxl xlrd

    - name: Build executable
      run: |
        pyinstaller --onefile --noconsole --name WellCorrelator --icon=NUL `
          --add-data "README.md;." `
          --hidden-import PyQt6.sip `
          --hidden-import pyqtgraph.graphicsItems.ViewBox.axisCtrlTemplate_pyqt6 `
          --collect-all pyqtgraph `
          --collect-all lasio `
          02-v6.7-速度计算.py
      shell: cmd

    - name: Upload artifact (EXE)
      uses: actions/upload-artifact@v4
      with:
        name: WellCorrelator_Windows_x64
        path: dist/WellCorrelator.exe
        retention-days: 30
